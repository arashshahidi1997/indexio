site_name: indexio
site_description: Lightweight semantic indexing and retrieval for project knowledge sources

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Quickstart: tutorials/quickstart.md
  - How-To Guides:
      - how-to/index.md
      - Initialize A Config: how-to/init.md
      - Build An Index: how-to/build.md
      - Query The Index: how-to/query.md
      - Register Sources From Other Packages: how-to/register-sources.md
      - Run The Chat Server: how-to/chat.md
  - Explanation:
      - explanation/index.md
      - Ecosystem Links: explanation/ecosystem-links.md
      - Project Status: explanation/status.md
      - Architecture: explanation/architecture.md
      - Role In The Projio Ecosystem: explanation/ecosystem.md
  - Logs:
      - log/index.md
      - Commit: log/commit/index.md
      - Daily: log/daily/index.md
      - Idea:
          - log/idea/index.md
          - Unified Chatbot: log/idea/idea-arash-20260312-163249-548902.md
          - Pluggable RAG Engines: log/idea/idea-arash-20260312-175539-442171.md
      - Issue: log/issue/index.md
      - Meeting: log/meeting/index.md
      - Personal: log/personal/index.md
      - Weekly: log/weekly/index.md
  - Reference:
      - reference/index.md
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Python API: reference/api.md
